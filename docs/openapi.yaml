openapi: 3.0.3
info:
        title: Fantasy Basketball API (Draft)
        version: 0.1.0
        description: |
                Initial OpenAPI spec for the fantasy basketball backend. This is a Month-1 skeleton capturing authentication, players, teams, and match simulation endpoints.
servers:
        - url: /api

components:
        securitySchemes:
                bearerAuth:
                        type: http
                        scheme: bearer
                        bearerFormat: JWT
        schemas:
                User:
                        type: object
                        properties:
                                id:
                                        type: integer
                                email:
                                        type: string
                                username:
                                        type: string
                AuthResponse:
                        type: object
                        properties:
                                access:
                                        type: string
                                refresh:
                                        type: string
                Player:
                        type: object
                        properties:
                                id:
                                        type: integer
                                external_id:
                                        type: string
                                        description: "ID from external NBA source (if available)"
                                name:
                                        type: string
                                position:
                                        type: string
                                team:
                                        type: string
                                stats:
                                        type: object
                Team:
                        type: object
                        properties:
                                id:
                                        type: integer
                                name:
                                        type: string
                                owner_id:
                                        type: integer
                MatchSimulationResult:
                        type: object
                        properties:
                                team_a_score:
                                        type: integer
                                team_b_score:
                                        type: integer
                                team_a_breakdown:
                                        type: array
                                        items:
                                                $ref: "#/components/schemas/Player"
                                team_b_breakdown:
                                        type: array
                                        items:
                                                $ref: "#/components/schemas/Player"

paths:
        /auth/register:
                post:
                        summary: Register a new user
                        requestBody:
                                required: true
                                content:
                                        application/json:
                                                schema:
                                                        type: object
                                                        properties:
                                                                email:
                                                                        {
                                                                                type: string,
                                                                        }
                                                                password:
                                                                        {
                                                                                type: string,
                                                                        }
                        responses:
                                "201":
                                        description: Created
                                        content:
                                                application/json:
                                                        schema:
                                                                $ref: "#/components/schemas/User"
        /auth/login:
                post:
                        summary: Obtain JWT tokens
                        requestBody:
                                required: true
                                content:
                                        application/json:
                                                schema:
                                                        type: object
                                                        properties:
                                                                email:
                                                                        {
                                                                                type: string,
                                                                        }
                                                                password:
                                                                        {
                                                                                type: string,
                                                                        }
                        responses:
                                "200":
                                        description: Token pair
                                        content:
                                                application/json:
                                                        schema:
                                                                $ref: "#/components/schemas/AuthResponse"

        /players:
                get:
                        summary: List players
                        parameters:
                                - in: query
                                  name: page
                                  schema: { type: integer }
                                - in: query
                                  name: search
                                  schema: { type: string }
                        responses:
                                "200":
                                        description: OK
        /players/{player_id}:
                get:
                        summary: Get player details
                        parameters:
                                - in: path
                                  name: player_id
                                  required: true
                                  schema: { type: integer }
                        responses:
                                "200":
                                        description: OK

        /teams:
                get:
                        summary: List current user's teams
                        security:
                                - bearerAuth: []
                        responses:
                                "200":
                                        description: OK
                post:
                        summary: Create a team
                        security:
                                - bearerAuth: []
                        requestBody:
                                required: true
                                content:
                                        application/json:
                                                schema:
                                                        type: object
                                                        properties:
                                                                name:
                                                                        {
                                                                                type: string,
                                                                        }
                        responses:
                                "201":
                                        description: Created
        /teams/{team_id}/players:
                post:
                        summary: Add player to a team
                        security:
                                - bearerAuth: []
                        parameters:
                                - in: path
                                  name: team_id
                                  required: true
                                  schema: { type: integer }
                        requestBody:
                                required: true
                                content:
                                        application/json:
                                                schema:
                                                        type: object
                                                        properties:
                                                                player_id:
                                                                        {
                                                                                type: integer,
                                                                        }
                        responses:
                                "200":
                                        description: Player added

        /matches/simulate:
                post:
                        summary: Simulate a match between two teams
                        security:
                                - bearerAuth: []
                        requestBody:
                                required: true
                                content:
                                        application/json:
                                                schema:
                                                        type: object
                                                        properties:
                                                                team_a_id:
                                                                        {
                                                                                type: integer,
                                                                        }
                                                                team_b_id:
                                                                        {
                                                                                type: integer,
                                                                        }
                                                                seed:
                                                                        {
                                                                                type: integer,
                                                                        }
                        responses:
                                "200":
                                        description: Simulation result
                                        content:
                                                application/json:
                                                        schema:
                                                                $ref: "#/components/schemas/MatchSimulationResult"
# Notes
# - We plan to integrate player sync with external NBA API (https://publicapi.dev/nba-data-api) via a management command that maps fields to `Player.external_id`, `Player.name`, `Player.position`, and `Player.team`.
# - Authentication: plan to use JWT (djangorestframework-simplejwt or similar).
